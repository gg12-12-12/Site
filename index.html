<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HOLLY LIQUID — Прайс-лист</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@800;900&family=Nunito:wght@600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root{
    --yellow:#F5C518;
    --yellow-deep:#E8A400;
    --red:#E8291C;
    --red-dark:#B01810;
    --ink:#171310;
    --cream:#FFF8E8;
    --paper:#FFFCF4;
  }

  *{box-sizing:border-box; margin:0; padding:0;}

  html{scroll-behavior:smooth;}

  body{
    font-family:'Nunito', sans-serif;
    background:
      radial-gradient(circle at 15% 20%, rgba(255,255,255,0.10) 0, transparent 45%),
      repeating-radial-gradient(circle at 50% 50%, var(--yellow) 0px, var(--yellow) 2px, var(--yellow-deep) 3px, var(--yellow-deep) 4px);
    background-size: 100% 100%, 18px 18px;
    color:var(--ink);
    min-height:100vh;
    overflow-x:hidden;
  }

  .burst-rays{
    position:fixed;
    inset:0;
    z-index:0;
    pointer-events:none;
    background:
      repeating-conic-gradient(from 0deg at 50% -20%,
        rgba(23,19,16,0.05) 0deg 4deg,
        transparent 4deg 12deg);
    opacity:0.6;
  }

  /* ---------- HEADER ---------- */
  header{
    position:relative;
    z-index:2;
    padding:28px 20px 40px;
    text-align:center;
  }

  .logo-wrap{
    max-width:230px;
    margin:0 auto 8px;
    filter:drop-shadow(0 8px 0 rgba(0,0,0,0.25));
  }
  .logo-wrap img{
    width:100%;
    display:block;
    border-radius:16px;
    border:4px solid var(--ink);
  }

  .tagline{
    font-family:'Montserrat', sans-serif;
    font-weight:900;
    letter-spacing:3px;
    font-weight:900;
    font-style:italic;
    font-size:clamp(1.4rem, 5vw, 2.1rem);
    color:var(--ink);
    background:var(--cream);
    display:inline-block;
    padding:9px 30px;
    border:4px solid var(--ink);
    border-radius:10px;
    box-shadow:5px 5px 0 var(--red);
    transform:rotate(-2deg) skewX(-4deg);
    margin-top:6px;
  }
  .tagline span{
    display:inline-block;
    transform:skewX(4deg);
  }

  /* ---------- SEARCH / FILTER BAR ---------- */
  .toolbar{
    position:sticky;
    top:0;
    z-index:10;
    background:var(--ink);
    padding:14px 16px;
    display:flex;
    gap:10px;
    flex-wrap:wrap;
    justify-content:center;
    box-shadow:0 4px 0 rgba(0,0,0,0.3);
  }
  .toolbar input[type="text"]{
    flex:1 1 220px;
    max-width:420px;
    padding:12px 16px;
    border-radius:30px;
    border:3px solid var(--yellow);
    background:var(--paper);
    font-family:'Nunito', sans-serif;
    font-weight:800;
    font-size:1rem;
    color:var(--ink);
    outline:none;
  }
  .toolbar input[type="text"]::placeholder{color:#8a8378;}
  .toolbar input[type="text"]:focus{
    border-color:var(--red);
    box-shadow:0 0 0 3px rgba(232,41,28,0.25);
  }

  .lang-switch{
    display:flex;
    gap:6px;
    flex-shrink:0;
  }
  .lang-btn{
    font-family:'Montserrat', sans-serif;
    font-weight:900;
    font-size:0.8rem;
    letter-spacing:1px;
    padding:10px 14px;
    border-radius:30px;
    border:3px solid var(--yellow);
    background:transparent;
    color:var(--yellow);
    cursor:pointer;
    transition:transform .12s ease;
  }
  .lang-btn:hover{transform:translateY(-2px);}
  .lang-btn.active{
    background:var(--yellow);
    color:var(--ink);
  }

  /* ---------- LANGUAGE PICKER OVERLAY ---------- */
  .lang-overlay{
    position:fixed;
    inset:0;
    z-index:200;
    background:
      repeating-radial-gradient(circle at 50% 50%, var(--yellow) 0px, var(--yellow) 2px, var(--yellow-deep) 3px, var(--yellow-deep) 4px);
    display:flex;
    align-items:center;
    justify-content:center;
    padding:24px;
  }
  .lang-overlay.hidden{display:none;}
  .lang-card{
    background:var(--cream);
    border:4px solid var(--ink);
    border-radius:24px;
    padding:36px 28px;
    max-width:380px;
    width:100%;
    text-align:center;
    box-shadow:10px 10px 0 var(--red);
  }
  .lang-card h1{
    font-family:'Montserrat', sans-serif;
    font-weight:900;
    font-style:italic;
    font-size:1.8rem;
    letter-spacing:1px;
    margin-bottom:6px;
    color:var(--ink);
  }
  .lang-card p{
    font-weight:800;
    font-size:0.95rem;
    color:#5a5347;
    margin-bottom:24px;
  }
  .lang-option{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:10px;
    width:100%;
    padding:14px;
    margin-bottom:12px;
    border-radius:14px;
    border:3px solid var(--ink);
    background:var(--paper);
    font-family:'Montserrat', sans-serif;
    font-weight:900;
    font-size:1.05rem;
    letter-spacing:0.5px;
    color:var(--ink);
    cursor:pointer;
    box-shadow:4px 4px 0 var(--ink);
    transition:transform .12s ease, box-shadow .12s ease, background .12s ease;
  }
  .lang-option:hover{
    transform:translate(-2px,-2px);
    box-shadow:6px 6px 0 var(--red);
    background:var(--yellow);
  }
  .lang-option:active{
    transform:translate(0,0);
    box-shadow:2px 2px 0 var(--ink);
  }

  /* ---------- BRAND SECTION LABELS ---------- */
  .brand-heading{
    position:relative;
    z-index:2;
    text-align:center;
    margin:38px auto 22px;
    padding:0 16px;
  }
  .brand-heading .burst{
    display:inline-block;
    font-family:'Montserrat', sans-serif;
    font-weight:900;
    text-transform:uppercase;
    font-size:clamp(1.6rem, 6vw, 2.6rem);
    color:var(--red);
    -webkit-text-stroke:2px var(--ink);
    text-shadow:3px 3px 0 var(--ink);
    letter-spacing:1px;
    transform:rotate(-1.5deg);
  }
  .brand-heading .count{
    display:block;
    font-size:0.95rem;
    font-weight:700;
    color:var(--ink);
    margin-top:2px;
    letter-spacing:0.5px;
  }

  /* ---------- GRID ---------- */
  .grid{
    position:relative;
    z-index:2;
    max-width:1180px;
    margin:0 auto;
    padding:0 16px 60px;
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(150px, 1fr));
    gap:16px;
  }

  .card{
    background:var(--paper);
    border:3px solid var(--ink);
    border-radius:14px;
    padding:12px;
    cursor:pointer;
    box-shadow:5px 5px 0 var(--ink);
    transition:transform .12s ease, box-shadow .12s ease;
    display:flex;
    flex-direction:column;
    align-items:center;
    text-align:center;
    position:relative;
    overflow:hidden;
  }
  .card:hover, .card:focus-visible{
    transform:translate(-3px,-3px);
    box-shadow:8px 8px 0 var(--red);
    outline:none;
  }
  .card:active{
    transform:translate(0,0);
    box-shadow:2px 2px 0 var(--ink);
  }

  .card .qty-badge{
    position:absolute;
    top:8px;
    right:8px;
    background:var(--red);
    color:var(--cream);
    font-weight:900;
    font-size:0.7rem;
    padding:3px 8px;
    border-radius:20px;
    border:2px solid var(--ink);
    transform:rotate(6deg);
  }

  .card .thumb{
    width:74px;
    height:74px;
    border-radius:50%;
    background:linear-gradient(160deg, var(--yellow) 0%, var(--yellow-deep) 100%);
    border:3px solid var(--ink);
    display:flex;
    align-items:center;
    justify-content:center;
    margin-bottom:10px;
  }
  .card .thumb svg{width:38px; height:38px;}

  .card .brand-tag{
    font-size:0.65rem;
    font-weight:900;
    letter-spacing:1px;
    color:var(--red-dark);
    text-transform:uppercase;
    margin-bottom:2px;
  }

  .card .flavor{
    font-weight:800;
    font-size:0.92rem;
    line-height:1.15;
    color:var(--ink);
  }

  .card .price-tag{
    margin-top:8px;
    font-family:'Montserrat', sans-serif;
    font-weight:900;
    text-transform:uppercase;
    font-size:1.05rem;
    color:var(--ink);
    background:var(--yellow);
    border:2px solid var(--ink);
    padding:2px 12px;
    border-radius:20px;
    text-decoration:none;
    display:inline-block;
    cursor:pointer;
    transition:transform .1s ease, background .1s ease;
  }
  .card .price-tag:hover{
    background:var(--red);
    color:var(--cream);
    transform:scale(1.06);
  }
  .card .price-tag.placeholder{
    color:#8a8378;
    background:transparent;
    border-style:dashed;
  }

  /* ---------- MODAL ---------- */
  .modal-overlay{
    position:fixed;
    inset:0;
    background:rgba(23,19,16,0.72);
    backdrop-filter:blur(2px);
    display:none;
    align-items:center;
    justify-content:center;
    z-index:100;
    padding:20px;
  }
  .modal-overlay.active{display:flex;}

  .modal{
    background:var(--cream);
    border:4px solid var(--ink);
    border-radius:20px;
    max-width:420px;
    width:100%;
    padding:26px 24px 28px;
    position:relative;
    box-shadow:10px 10px 0 var(--red);
    animation:pop .18s ease;
  }
  @keyframes pop{
    from{transform:scale(0.85); opacity:0;}
    to{transform:scale(1); opacity:1;}
  }

  .modal .close-btn{
    position:absolute;
    top:-14px;
    right:-14px;
    width:38px;
    height:38px;
    border-radius:50%;
    background:var(--red);
    color:var(--cream);
    border:3px solid var(--ink);
    font-family:'Montserrat', sans-serif;
    font-weight:900;
    text-transform:uppercase;
    font-size:1.3rem;
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    box-shadow:3px 3px 0 var(--ink);
  }
  .modal .close-btn:hover{background:var(--red-dark);}

  .modal .modal-thumb{
    width:120px;
    height:120px;
    border-radius:50%;
    background:linear-gradient(160deg, var(--yellow) 0%, var(--yellow-deep) 100%);
    border:4px solid var(--ink);
    display:flex;
    align-items:center;
    justify-content:center;
    margin:0 auto 16px;
  }
  .modal .modal-thumb svg{width:60px; height:60px;}

  .modal .modal-brand{
    text-align:center;
    font-size:0.75rem;
    font-weight:900;
    letter-spacing:1.5px;
    color:var(--red-dark);
    text-transform:uppercase;
  }

  .modal .modal-flavor{
    text-align:center;
    font-family:'Montserrat', sans-serif;
    font-weight:900;
    text-transform:uppercase;
    font-size:1.8rem;
    letter-spacing:0.5px;
    color:var(--ink);
    margin:2px 0 10px;
    line-height:1.05;
  }

  .modal .modal-desc{
    text-align:center;
    font-size:0.95rem;
    font-weight:600;
    color:#3a352d;
    line-height:1.5;
    margin-bottom:16px;
  }

  .modal .modal-meta{
    display:flex;
    justify-content:center;
    gap:10px;
    flex-wrap:wrap;
    margin-bottom:18px;
  }
  .modal .meta-pill{
    background:var(--paper);
    border:2px solid var(--ink);
    border-radius:20px;
    padding:4px 12px;
    font-size:0.8rem;
    font-weight:800;
  }

  .modal .modal-price{
    text-align:center;
    font-family:'Montserrat', sans-serif;
    font-weight:900;
    text-transform:uppercase;
    font-size:2.2rem;
    color:var(--red);
    -webkit-text-stroke:1.5px var(--ink);
    background:var(--yellow);
    border:3px solid var(--ink);
    border-radius:16px;
    padding:6px 20px;
    display:block;
    width:fit-content;
    margin:0 auto;
    transform:rotate(-2deg);
    box-shadow:4px 4px 0 var(--ink);
    text-decoration:none;
    cursor:pointer;
    transition:transform .12s ease;
  }
  .modal .modal-price:hover{
    transform:rotate(-2deg) scale(1.05);
  }
  .modal .modal-price.placeholder{
    font-size:1.3rem;
    color:#8a8378;
    background:transparent;
    border-style:dashed;
  }

  /* ---------- FOOTER ---------- */
  footer{
    position:relative;
    z-index:2;
    text-align:center;
    padding:30px 16px 40px;
    color:var(--ink);
    font-weight:800;
    font-size:0.9rem;
  }
  footer .boom{
    font-family:'Montserrat', sans-serif;
    font-weight:900;
    text-transform:uppercase;
    font-size:1.3rem;
    color:var(--red);
    -webkit-text-stroke:1px var(--ink);
  }

  @media (max-width: 480px){
    .grid{grid-template-columns:repeat(auto-fill, minmax(130px, 1fr));}
  }

  /* Reduced motion */
  @media (prefers-reduced-motion: reduce){
    html{scroll-behavior:auto;}
    .card, .modal{transition:none; animation:none;}
  }
</style>
</head>

<div class="lang-overlay" id="langOverlay">
  <div class="lang-card">
    <h1>💥 HOLLY LIQUID! 💥</h1>
    <p>Choose your language / Wybierz język / Оберіть мову</p>
    <button class="lang-option" onclick="setLanguage('ua')">🇺🇦 Українська</button>

</div>

      pl:"Banan — słodki i intensywny klasyczny smak.",
      en:"Banana — a sweet and rich classic taste."}},
  ];

  // ---------- STATE ----------
  let currentLang = null;

  function qtyLabel(qty, lang){
    if(!qty) return '';
    return qty + ' ' + ui[lang].qtyLabel;
  }

  function makeCard(brand, item, gridId, lang){
    const card = document.createElement('div');
    card.className = 'card';
    card.tabIndex = 0;
    card.setAttribute('data-search', (item.n + ' ' + brand).toLowerCase());
    const qtyTxt = qtyLabel(item.qty, lang);
    const thumbContent = item.img
      ? `<img src="${item.img}" alt="${item.n}" style="width:100%;height:100%;object-fit:cover;border-radius:50%;">`
      : bottleIcon;
    card.innerHTML = `
      ${qtyTxt ? `<span class="qty-badge">${qtyTxt}</span>` : ''}
      <div class="thumb">${thumbContent}</div>
      <div class="brand-tag">${brand}</div>
      <div class="flavor">${item.n}</div>
      <a class="price-tag" href="${telegramLink}" target="_blank" rel="noopener" onclick="event.stopPropagation()">50 zł</a>
    `;
    card.addEventListener('click', () => openModal(brand, item, lang));
    card.addEventListener('keypress', (e) => { if(e.key === 'Enter') openModal(brand, item, lang); });
    document.getElementById(gridId).appendChild(card);
  }

  function renderCards(lang){
    document.getElementById('elfliqGrid').innerHTML = '';
    document.getElementById('chaserGrid').innerHTML = '';
    elfliqFlavors.forEach(f => makeCard('ELFLIQ 30ml 5%', f, 'elfliqGrid', lang));
    chaserFlavors.forEach(f => makeCard('Chaser Lux 30ml 5%', f, 'chaserGrid', lang));

    document.querySelectorAll('.brand-heading .burst')[0].textContent = ui[lang].elfHeading;
    document.querySelectorAll('.brand-heading .burst')[1].textContent = ui[lang].chaserHeading;
    document.getElementById('elfliqCount').textContent = elfliqFlavors.length + ' ' + ui[lang].flavorsWord(elfliqFlavors.length);
    document.getElementById('chaserCount').textContent = chaserFlavors.length + ' ' + ui[lang].flavorsWord(chaserFlavors.length);
    document.getElementById('searchInput').placeholder = ui[lang].searchPh;
    document.querySelector('footer .boom').nextElementSibling.textContent = ui[lang].footerLine;
  }

  // ---------- MODAL ----------
  function openModal(brand, item, lang){
    document.getElementById('modalBrand').textContent = brand;
    document.getElementById('modalFlavor').textContent = item.n;
    document.getElementById('modalDesc').textContent = item.d[lang];
    const qtyEl = document.getElementById('modalQty');
    const qtyTxt = qtyLabel(item.qty, lang);
    if(qtyTxt){ qtyEl.style.display='inline-block'; qtyEl.textContent = qtyTxt; }
    else{ qtyEl.style.display='none'; }
    const thumbEl = document.getElementById('modalThumb');
    thumbEl.innerHTML = item.img
      ? `<img src="${item.img}" alt="${item.n}" style="width:100%;height:100%;object-fit:cover;border-radius:50%;">`
      : bottleIcon;
    document.getElementById('modalOverlay').classList.add('active');
    document.body.style.overflow = 'hidden';
  }
  function closeModal(){
    document.getElementById('modalOverlay').classList.remove('active');
    document.body.style.overflow = '';
  }
  function closeModalOnOverlay(e){
    if(e.target.id === 'modalOverlay') closeModal();
  }
  document.addEventListener('keydown', (e) => { if(e.key === 'Escape') closeModal(); });

  // ---------- SEARCH ----------
  function filterCards(){
    const q = document.getElementById('searchInput').value.toLowerCase().trim();
    document.querySelectorAll('.card').forEach(card => {
      const match = card.getAttribute('data-search').includes(q);
      card.style.display = match ? 'flex' : 'none';
    });
    document.querySelectorAll('.grid').forEach(grid => {
      const anyVisible = Array.from(grid.children).some(c => c.style.display !== 'none');
      grid.previousElementSibling.style.display = anyVisible ? '' : 'none';
      grid.style.display = anyVisible ? '' : 'none';
    });
  }

  // ---------- LANGUAGE ----------
  function setLanguage(lang){
    currentLang = lang;
    document.getElementById('langOverlay').classList.add('hidden');
    document.querySelectorAll('.lang-btn').forEach(b => {
      b.classList.toggle('active', b.getAttribute('data-lang') === lang);
    });
    renderCards(lang);
    document.getElementById('searchInput').value = '';
  }

  // ---------- INIT ----------
  (function init(){
    document.getElementById('langOverlay').classList.remove('hidden');
  })();
</script>
